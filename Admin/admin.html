<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wedding Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>💍 Admin Panel</h2>

<ul>
<li onclick="showSection('dashboard')">Dashboard</li>
<li onclick="showSection('booking')">Bookings</li>
<li onclick="showSection('gallery')">Gallery</li>
<li onclick="showSection('services')">Services</li>
<li onclick="showSection('users')">Customers</li>
<li onclick="logout()">Logout</li>
</ul>

</div>


<!-- MAIN CONTENT -->
<div class="main">

<h1>Wedding Website Manager</h1>

<!-- DASHBOARD -->
<section id="dashboard" class="section active">
<h2>Overview</h2>

<div class="cards">

<div class="card">
<h3>Bookings</h3>
<p id="totalBookings">0</p>
</div>

<div class="card">
<h3>Gallery Images</h3>
<p id="totalImages">0</p>
</div>

<div class="card">
<h3>Customers</h3>
<p id="totalUsers">0</p>
</div>

</div>
</section>


<!-- BOOKINGS -->
<section id="booking" class="section">
<h2>Wedding Bookings</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Service</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookingList"></tbody>
</table>

</section>


<!-- GALLERY -->
<section id="gallery" class="section">

<h2>Upload Wedding Image</h2>

<input type="file" id="imageUpload">
<button onclick="addImage()">Upload</button>

<div id="galleryPreview" class="gallery"></div>

</section>


<!-- SERVICES -->
<section id="services" class="section">

<h2>Add Wedding Service</h2>

<input type="text" id="serviceName" placeholder="Service Name">
<button onclick="addService()">Add Service</button>

<ul id="serviceList"></ul>

</section>


<!-- USERS -->
<section id="users" class="section">
<h2>Customer List</h2>

<ul id="userList"></ul>

</section>

</div>
</div>

<script src="admin.js"></script>

</body>
</html>
