<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bridal Belle Boutique - Book Consultation</title>

<link rel="stylesheet" href="./Css/style.css">
<link rel="stylesheet" href="./Css/booking.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="./Js/db.js"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="header">

<h1 class="logo">Bridal Belle Boutique</h1>

<nav id="navMenu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</nav>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
<h2>Book Your Dream Wedding</h2>
<p>Select all materials for your perfect ceremony</p>
</section>

<!-- ================= BOOKING FORM ================= -->
<section class="booking-container">

<form class="booking-form" id="bookingForm">

<h2>Wedding Booking Form</h2>

<label>Your Details</label>
<input type="text" id="custName" placeholder="Full Name" required>
<input type="email" id="custEmail" placeholder="Email Address" required>
<input type="tel" id="custPhone" placeholder="Phone Number" required>

<label>Wedding Date</label>
<input type="date" id="weddingDate" required>

<label>Select Wedding Materials</label>
<div class="materials" id="materialsList">
  <!-- Dynamically injected from db.js services -->
</div>


<label>Additional Requests</label>
<textarea id="additionalRequests" placeholder="Write any specific colors, dimensions, or instructions here..."></textarea>

<button type="submit">Confirm Booking</button>

</form>

</section>

<!-- ================= CONFIRMATION MODAL ================= -->
<div id="confirmModal" class="custom-modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></span>
    <div class="modal-icon"><i class="fas fa-calendar-check"></i></div>
    <h2>Booking Confirmed!</h2>
    <p style="color: var(--text-light); margin-bottom: 20px;">Your dream wedding ceremony details have been scheduled successfully.</p>
    
    <div id="bookingSummary"></div>
    
    <button onclick="goToHome()" class="book-btn" style="margin-top: 15px;">Back to Home</button>
  </div>
</div>

<footer>
<p>© 2026 Wedding Wear Rental</p>
</footer>

<script src="./Js/booking.js"></script>

</body>
</html>
