<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bridal Belle Boutique - Premium Collection</title>

<link rel="stylesheet" href="./Css/style.css">
<link rel="stylesheet" href="./Css/gallery.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="./Js/db.js"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

<h1 class="logo">Bridal Belle Boutique</h1>

<nav id="navMenu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html" class="active">Gallery</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</nav>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
<h2>Our Bridal Collection</h2>
<p>Discover Elegant Wedding Moments</p>
</section>

<!-- ================= GALLERY ================= -->
<div class="container">

  <!-- Filters and Search controls -->
  <div class="gallery-controls">
    <div class="gallery-filters" id="filtersList">
      <button class="filter-btn active" data-category="all">All Collection</button>
      <button class="filter-btn" data-category="dresses">Bridal Dresses</button>
      <button class="filter-btn" data-category="suits">Groom Suits</button>
      <button class="filter-btn" data-category="decor">Wedding Decoration</button>
      <button class="filter-btn" data-category="cars">Wedding Cars</button>
    </div>
    
    <div class="gallery-search">
      <i class="fas fa-search"></i>
      <input type="text" id="gallerySearchInput" placeholder="Search collection by title...">
    </div>
  </div>

  <!-- Dynamic Gallery Grid -->
  <div class="gallery" id="galleryGrid">
    <!-- Loaded Dynamically from db.js -->
  </div>

</div>

<!-- ================= LIGHTBOX ================= -->
<div id="lightbox">
  <div class="lightbox-content">
    <span class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></span>
    <button class="lightbox-btn lightbox-prev" onclick="changeLightboxImg(-1)"><i class="fas fa-chevron-left"></i></button>
    <img id="lightbox-img" src="" alt="Lightbox image">
    <button class="lightbox-btn lightbox-next" onclick="changeLightboxImg(1)"><i class="fas fa-chevron-right"></i></button>
    <div class="lightbox-caption" id="lightbox-caption">Caption</div>
  </div>
</div>

<!-- ================= FOOTER ================= -->
<section class="cta fade">

<h2>Your Dream Wedding Starts With Us 💍</h2>

<button onclick="bookNow()" class="book-btn">
Book Consultation
</button>

<!-- SOCIAL MEDIA -->
<div class="social-media">

<a href="#" class="social instagram" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="#" class="social tiktok" target="_blank">
<i class="fab fa-tiktok"></i>
</a>

<a href="#" class="social facebook" target="_blank">
<i class="fab fa-facebook-f"></i>
</a>

</div>

</section>
<footer>
<p>© 2026 Wedding Wear Rental</p>
</footer>

<script>
function toggleMenu(){
 document.getElementById("navMenu").classList.toggle("active");
}

// State variables for gallery filter, search and lightbox
let activeCategory = 'all';
let searchQuery = '';
let currentGalleryItems = [];
let lightboxIndex = 0;

// Fetch all gallery items from local storage
let allGalleryItems = window.db.getGallery() || [];

// DOM Elements
const galleryGrid = document.getElementById("galleryGrid");
const searchInput = document.getElementById("gallerySearchInput");
const filterButtons = document.querySelectorAll(".filter-btn");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxCaption = document.getElementById("lightbox-caption");

// Render Gallery function
function renderGallery() {
  // Filter by Category
  let filtered = allGalleryItems.filter(item => {
    if (activeCategory === 'all') return true;
    return item.category === activeCategory;
  });

  // Filter by Search Query
  if (searchQuery.trim() !== '') {
    const query = searchQuery.toLowerCase();
    filtered = filtered.filter(item => {
      const titleMatch = item.title && item.title.toLowerCase().includes(query);
      const categoryMatch = item.category && item.category.toLowerCase().includes(query);
      return titleMatch || categoryMatch;
    });
  }

  currentGalleryItems = filtered;

  if (filtered.length === 0) {
    galleryGrid.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 50px 0; color: var(--text-light);">
        <i class="far fa-image" style="font-size: 40px; margin-bottom: 15px; color: var(--primary);"></i>
        <p>No collection items found matching your filters.</p>
      </div>
    `;
    return;
  }

  galleryGrid.innerHTML = filtered.map((item, idx) => `
    <div class="gallery-item fade" onclick="openLightbox(${idx})">
      <img src="${item.image}" alt="${item.title}">
      <div class="gallery-info">
        <h4>${item.title}</h4>
        <span>${item.category}</span>
      </div>
    </div>
  `).join("");

  // Re-observe animations
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  });
  document.querySelectorAll(".fade").forEach(el => observer.observe(el));
}

// Filter Event Listeners
filterButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    filterButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.getAttribute("data-category");
    renderGallery();
  });
});

// Search Event Listener
searchInput.addEventListener("input", (e) => {
  searchQuery = e.target.value;
  renderGallery();
});

// Lightbox functions
function openLightbox(index) {
  lightboxIndex = index;
  const item = currentGalleryItems[lightboxIndex];
  if (!item) return;

  lightboxImg.src = item.image;
  lightboxCaption.textContent = item.title;
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden"; // Disable background scrolling
}

function closeLightbox() {
  lightbox.classList.remove("active");
  document.body.style.overflow = "";
}

function changeLightboxImg(dir) {
  if (currentGalleryItems.length === 0) return;
  lightboxIndex = (lightboxIndex + dir + currentGalleryItems.length) % currentGalleryItems.length;
  const item = currentGalleryItems[lightboxIndex];
  if (item) {
    lightboxImg.src = item.image;
    lightboxCaption.textContent = item.title;
  }
}

// Close lightbox on click outside the image
lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox || e.target.classList.contains("lightbox-content")) {
    closeLightbox();
  }
});

// Initialize Gallery Page load
renderGallery();

function bookNow(){
    window.location.href = "booking.html";
}
</script>

</body>
</html>
