<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Wedding Wear Rental</title>

<link rel="stylesheet" href="./Css/contact.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="header">

<h1 class="logo">Bridal Belle Boutique</h1>

<nav id="navMenu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</nav>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
<h2>Contact Us</h2>
<p>We would love to hear from you</p>
</section>

<!-- ================= CONTACT SECTION ================= -->
<section class="contact-container">

<!-- CONTACT FORM -->
<div class="contact-form">

<h2>Send Us a Message</h2>

<form onsubmit="return sendMessage()">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<textarea placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

<!-- CONTACT INFO -->
<div class="contact-info">

<h2>Our Information</h2>

<div class="info-card">
📍 Kigali, Rwanda
</div>

<div class="info-card">
📞 +250 795 857 921
</div>

<div class="info-card">
✉️ bridalbelle@outlook.com
</div>

</div>

</section>

<!-- ================= MAP ================= -->
<section class="map">
<iframe
src="https://www.google.com/maps?q=Kigali,Rwanda&output=embed"
loading="lazy"
allowfullscreen>
</iframe>
</section>

<!-- ================= FOOTER ================= -->
<section class="cta fade">

<h2>Your Dream Wedding Starts With Us 💍</h2>

<button onclick="bookNow()" class="book-btn">
Book Consultation
</button>

<!-- SOCIAL MEDIA -->
<div class="social-media">

<a href="#" class="social instagram" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="#" class="social tiktok" target="_blank">
<i class="fab fa-tiktok"></i>
</a>

<a href="#" class="social facebook" target="_blank">
<i class="fab fa-facebook-f"></i>
</a>

</div>

</section>
<footer>
<p>© 2026 Wedding Wear Rental</p>
</footer>

<script>
function toggleMenu(){
 document.getElementById("navMenu").classList.toggle("active");
}

function sendMessage(){
 alert("Message sent successfully!");
 return false;
}
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".fade")
.forEach(el=>observer.observe(el));

function bookNow(){
    window.location.href = "booking.html";
}
</script>

</body>
</html>
