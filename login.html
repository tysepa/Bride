<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth - Bridal Belle Boutique</title>
  <link rel="stylesheet" href="./Css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="./Js/db.js"></script>
</head>

<body>

  <div class="container">
    <div class="form-box">
      
      <!-- LOGIN FORM -->
      <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
        <h2>Login</h2>
        
        <input type="email" id="loginEmail" placeholder="Email Address" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        
        <button type="submit">Login</button>
        
        <p>Don't have an account? 
          <a href="#" id="showSignup">Sign Up</a>
        </p>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" class="form" onsubmit="handleSignup(event)">
        <h2>Create Account</h2>
        
        <input type="text" id="signupName" placeholder="Full Name" required>
        <input type="email" id="signupEmail" placeholder="Email Address" required>
        <input type="tel" id="signupPhone" placeholder="Phone Number" required>
        <input type="password" id="signupPassword" placeholder="Password" required>
        
        <button type="submit">Sign Up</button>
        
        <p>Already have an account? 
          <a href="#" id="showLogin">Login</a>
        </p>
      </form>

      <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
    </div>
  </div>

  <script src="./Js/login.js"></script>
</body>
</html>
